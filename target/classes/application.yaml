spring:
  application:
    name: intensivo-java
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:intensivo_java}?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:senha234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  thymeleaf:
    cache: false
  mvc:
    hiddenmethod:
      filter:
        enabled: false
  jackson:
    time-zone: America/Sao_Paulo
server:
  port: 8080
  error:
    include-message: never
logging:
  level:
    root: INFO
    com.intensivo.java: INFO
    org.springframework.boot.webmvc.autoconfigure.WelcomePageHandlerMapping: WARN
app:
---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: create
  thymeleaf:
    cache: false
