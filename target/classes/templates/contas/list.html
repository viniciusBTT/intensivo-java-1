<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Contas')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar('contas')}"></div>
<main class="container py-4">
    <section class="page-header mb-4">
        <div>
            <span class="hero-badge">Gestão de contas</span>
            <h1 class="display-title mt-2 mb-0">Contas correntes e jurídicas</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-app" th:href="@{/contas/corrente/novo}">Nova corrente</a>
            <a class="btn btn-outline-dark" th:href="@{/contas/juridica/novo}">Nova jurídica</a>
        </div>
    </section>

    <div class="card app-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table app-table mb-0">
                    <thead>
                    <tr>
                        <th>Tipo</th>
                        <th>Titular</th>
                        <th>Status</th>
                        <th>Saldo inicial</th>
                        <th>Tarifa</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(contas)}">
                        <td colspan="5" class="text-center text-secondary py-5">Nenhuma conta cadastrada nesta versão da aula 1.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
