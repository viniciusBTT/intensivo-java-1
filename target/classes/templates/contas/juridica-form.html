<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${tituloFormulario})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar('contas')}"></div>
<main class="container py-4">
    <section class="page-header mb-4">
        <div>
            <span class="hero-badge">Conta jurídica</span>
            <h1 class="display-title mt-2 mb-0" th:text="${tituloFormulario}">Nova Conta Jurídica</h1>
        </div>
    </section>

    <form class="card app-card p-4" th:object="${form}" onsubmit="return false;">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="clienteId">Cliente PJ</label>
                <select id="clienteId" th:field="*{clienteId}" class="form-select">
                    <option value="">Nenhum cliente disponível</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="saldoInicial">Saldo inicial</label>
                <input id="saldoInicial" th:field="*{saldoInicial}" type="number" min="0" step="0.01" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="taxaPacoteMensal">Tarifa mensal</label>
                <input id="taxaPacoteMensal" th:field="*{taxaPacoteMensal}" type="number" min="0" step="0.01" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label" for="responsavelFinanceiro">Responsável financeiro</label>
                <input id="responsavelFinanceiro" th:field="*{responsavelFinanceiro}" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="status">Status</label>
                <select id="status" th:field="*{status}" class="form-select">
                    <option th:each="status : ${statusList}" th:value="${status}" th:text="${status}"></option>
                </select>
            </div>
        </div>
        <div class="d-flex gap-2 justify-content-end mt-4">
            <a class="btn btn-outline-dark" th:href="@{/contas}">Cancelar</a>
            <button class="btn btn-app" type="submit" disabled>Salvar conta jurídica</button>
        </div>
    </form>
</main>
</body>
</html>
