<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Clientes')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar('clientes')}"></div>
<main class="container py-4">
    <section class="page-header mb-4">
        <div>
            <span class="hero-badge">Carteira de clientes</span>
            <h1 class="display-title mt-2 mb-0">Clientes cadastrados</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-app" th:href="@{/clientes/novo}">Novo cliente</a>
        </div>
    </section>

    <div class="card app-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table app-table mb-0">
                    <thead>
                    <tr>
                        <th>Tipo</th>
                        <th>Nome</th>
                        <th>Documento</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Cidade</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td colspan="6" class="text-center text-secondary py-5">Nenhum cliente cadastrado nesta versão da aula 1.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
