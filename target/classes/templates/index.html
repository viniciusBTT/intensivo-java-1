<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dashboard')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar('dashboard')}"></div>
<main class="container py-4">
    <section class="app-hero mb-4">
        <div>
            <span class="hero-badge">Painel de gestão</span>
            <h1 class="display-title mt-3 mb-2">Aplicação mínima da aula 1</h1>
            <p class="text-secondary mb-0">Apenas navegação entre telas, sem autenticação e sem persistência de formulários.</p>
        </div>
        <div class="hero-actions">
            <a class="btn btn-app" th:href="@{/clientes/novo}">Novo cliente</a>
            <a class="btn btn-outline-dark" th:href="@{/contas/corrente/novo}">Nova conta corrente</a>
        </div>
    </section>

    <section class="row g-4">
        <div class="col-md-6">
            <article class="metric-card">
                <span class="metric-label">Clientes cadastrados</span>
                <strong class="metric-value" th:text="${totalClientes}">0</strong>
                <a th:href="@{/clientes}" class="metric-link">Abrir carteira de clientes</a>
            </article>
        </div>
        <div class="col-md-6">
            <article class="metric-card accent">
                <span class="metric-label">Contas cadastradas</span>
                <strong class="metric-value" th:text="${totalContas}">0</strong>
                <a th:href="@{/contas}" class="metric-link">Abrir gestão de contas</a>
            </article>
        </div>
    </section>
</main>
</body>
</html>
