<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${tituloFormulario})}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar('clientes')}"></div>
<main class="container py-4">
    <section class="page-header mb-4">
        <div>
            <span class="hero-badge">Cadastro de cliente</span>
            <h1 class="display-title mt-2 mb-0" th:text="${tituloFormulario}">Novo Cliente</h1>
        </div>
    </section>

    <div th:replace="~{fragments/messages :: messages}"></div>

    <form class="card app-card p-4"
          th:action="@{${submitPath}}"
          th:object="${form}"
          method="post"
          data-cep-form>
        <div class="alert alert-danger shadow-sm" role="alert" th:if="${#fields.hasGlobalErrors()}">
            <div th:each="error : ${#fields.globalErrors()}" th:text="${error}"></div>
        </div>
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label" for="tipoCliente">Tipo</label>
                <select id="tipoCliente" th:field="*{tipoCliente}" class="form-select">
                    <option value="">Selecione</option>
                    <option th:each="tipo : ${tipoClientes}" th:value="${tipo}" th:text="${tipo.descricao}"></option>
                </select>
                <div class="invalid-feedback d-block" th:errors="*{tipoCliente}"></div>
            </div>
            <div class="col-md-5">
                <label class="form-label" for="nome">Nome / Razão social</label>
                <input id="nome" th:field="*{nome}" class="form-control">
                <div class="invalid-feedback d-block" th:errors="*{nome}"></div>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="documento">CPF / CNPJ</label>
                <input id="documento" th:field="*{documento}" class="form-control">
                <div class="invalid-feedback d-block" th:errors="*{documento}"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="email">Email</label>
                <input id="email" th:field="*{email}" class="form-control">
                <div class="invalid-feedback d-block" th:errors="*{email}"></div>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="telefone">Telefone</label>
                <input id="telefone" th:field="*{telefone}" class="form-control">
                <div class="invalid-feedback d-block" th:errors="*{telefone}"></div>
            </div>

            <div class="col-md-4">
                <label class="form-label" for="cep">CEP</label>
                <input id="cep" th:field="*{cep}" class="form-control" data-cep-input>
                <div class="invalid-feedback d-block" th:errors="*{cep}"></div>
            </div>
            <div class="col-md-8">
                <label class="form-label" for="logradouro">Logradouro</label>
                <input id="logradouro" th:field="*{logradouro}" class="form-control" data-cep-target="logradouro" readonly>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="numero">Numero</label>
                <input id="numero" th:field="*{numero}" class="form-control">
                <div class="invalid-feedback d-block" th:errors="*{numero}"></div>
            </div>
            <div class="col-md-3">
                <label class="form-label" for="complemento">Complemento</label>
                <input id="complemento" th:field="*{complemento}" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="bairro">Bairro</label>
                <input id="bairro" th:field="*{bairro}" class="form-control" data-cep-target="bairro" readonly>
            </div>
            <div class="col-md-1">
                <label class="form-label" for="uf">UF</label>
                <input id="uf" th:field="*{uf}" class="form-control" data-cep-target="uf" readonly>
            </div>
            <div class="col-md-5">
                <label class="form-label" for="cidade">Cidade</label>
                <input id="cidade" th:field="*{cidade}" class="form-control" data-cep-target="cidade" readonly>
            </div>
        </div>
        <div class="d-flex gap-2 justify-content-end mt-4">
            <a class="btn btn-outline-dark" th:href="@{/clientes}">Cancelar</a>
            <button class="btn btn-app" type="submit">Salvar cliente</button>
        </div>
    </form>
</main>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
