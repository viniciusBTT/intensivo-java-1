<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<nav class="navbar navbar-expand-lg app-navbar" th:fragment="navbar(active)">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}">Intensivo Bank</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'dashboard' ? 'active' : ''}" th:href="@{/}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'clientes' ? 'active' : ''}" th:href="@{/clientes}">Clientes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'contas' ? 'active' : ''}" th:href="@{/contas}">Contas</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
